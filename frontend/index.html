<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Word Count</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <h1>PDF Word Count</h1>
  <p>Upload a PDF and send it to backend on port 7001.</p>

  <fieldset>
    <legend>Upload PDF</legend>
    <label for="pdfFile">PDF File</label>
    <input id="pdfFile" type="file" accept="application/pdf" />
    <button id="submitBtn">Upload and Count</button>
  </fieldset>

  <div id="status" class="status">Waiting for upload.</div>

  <script>
    const statusEl = document.getElementById('status');
    const pdfInput = document.getElementById('pdfFile');
    const submitBtn = document.getElementById('submitBtn');

    async function handleUpload() {
      const file = pdfInput.files[0];
      if (!file) {
        statusEl.textContent = 'Please choose a PDF file first.';
        return;
      }
      const url = 'http://localhost:7001/pdf/wordcount';
      statusEl.textContent = `Uploading to ${url} ...`;

      try {
        const formData = new FormData();
        formData.append('file', file);
        const resp = await fetch(url, {
          method: 'POST',
          body: formData,
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          statusEl.textContent = data.error || `Request failed with status ${resp.status}`;
          return;
        }
        statusEl.textContent = `Word count: ${data.wordCount ?? 'unknown'}`;
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
      }
    }

    submitBtn.addEventListener('click', (e) => {
      e.preventDefault();
      handleUpload();
    });
  </script>
</body>
</html>
