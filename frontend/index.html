<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Word Count</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Distributed Algo Lab</p>
      <h1>PDF Word Count Service</h1>
      <p class="subtext">Upload a PDF and send it to backend on port 7001 for processing.</p>
    </section>

    <section class="panel" aria-label="Upload Panel">
      <div class="panel-head">
        <h2>Upload PDF</h2>
        <span class="chip">Target: localhost:7001</span>
      </div>

      <label for="pdfFile">Choose PDF file</label>
      <input id="pdfFile" type="file" accept="application/pdf" />

      <button id="submitBtn" type="button">Upload and Count Words</button>
    </section>

    <section class="panel" aria-label="Response Panel">
      <h2>Response</h2>
      <div id="status" class="status">Waiting for upload.</div>
      <div id="result" class="result"></div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const pdfInput = document.getElementById('pdfFile');
    const submitBtn = document.getElementById('submitBtn');

    function renderTopWords(topWords) {
      if (!Array.isArray(topWords) || topWords.length === 0) {
        resultEl.innerHTML = '<p class="muted">No words found in the PDF.</p>';
        return;
      }

      const rows = topWords
        .map((item, index) => `<tr><td>${index + 1}</td><td>${item.word}</td><td>${item.count}</td></tr>`)
        .join('');

      resultEl.innerHTML = `
        <h3>Top Word Frequencies</h3>
        <table>
          <thead>
            <tr><th>#</th><th>Word</th><th>Count</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function handleUpload() {
      const file = pdfInput.files[0];
      if (!file) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Please choose a PDF file first.';
        resultEl.innerHTML = '';
        return;
      }
      const url = 'http://localhost:7001/pdf/wordcount';
      statusEl.className = 'status busy';
      statusEl.textContent = `Uploading to ${url} ...`;
      resultEl.innerHTML = '';

      try {
        const formData = new FormData();
        formData.append('file', file);
        const resp = await fetch(url, {
          method: 'POST',
          body: formData,
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          statusEl.className = 'status error';
          statusEl.textContent = data.error || `Request failed with status ${resp.status}`;
          resultEl.innerHTML = '';
          return;
        }
        statusEl.className = 'status success';
        statusEl.textContent = `Total words: ${data.wordCount ?? 'unknown'} | Unique words: ${data.uniqueWordCount ?? 'unknown'}`;
        renderTopWords(data.topWords);
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = `Error: ${err.message}`;
        resultEl.innerHTML = '';
      }
    }

    submitBtn.addEventListener('click', (e) => {
      e.preventDefault();
      handleUpload();
    });
  </script>
</body>
</html>
